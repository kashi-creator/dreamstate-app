{% extends "base.html" %}
{% block title %}DREAMSTATE - Edit {{ story.title }}{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="container" style="max-width: 720px;">
        <div class="flex-between mb-3">
            <h1>Edit Script</h1>
            <div class="flex gap-1">
                <a href="{{ url_for('read_script', story_id=story.id) }}" class="btn btn-ghost btn-sm">Read Mode</a>
                <a href="{{ url_for('library') }}" class="btn btn-ghost btn-sm">Library</a>
            </div>
        </div>

        <form method="POST" action="{{ url_for('edit_script', story_id=story.id) }}">
            <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-input" value="{{ story.title }}">
            </div>
            <div class="form-group">
                <label class="form-label">Script</label>
                <textarea name="script_text" class="script-editor">{{ story.script_text or '' }}</textarea>
            </div>
            <div class="flex-between">
                <span class="text-muted" style="font-size: 0.85rem;">
                    {% if story.script_text %}{{ story.script_text.split()|length }} words{% endif %}
                </span>
                <button type="submit" class="btn btn-gold"><i class="fa-solid fa-check"></i> Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
