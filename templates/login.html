<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAMSTATE - Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container" id="flashContainer">
        {% for category, message in messages %}
        <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-page">
        <div class="card auth-card">
            <div class="text-center mb-3">
                <a href="{{ url_for('welcome') }}" class="navbar-brand" style="font-size: 1.2rem;">Dream<span>state</span></a>
            </div>
            <h2>Welcome Back</h2>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block">Enter Your Dreamstate</button>
            </form>
            <div class="auth-divider">
                New here? <a href="{{ url_for('pricing') }}">See pricing</a>
            </div>
        </div>
    </div>

    <script>
    setTimeout(() => { const fc = document.getElementById('flashContainer'); if (fc) { fc.style.opacity = '0'; setTimeout(() => fc.remove(), 300); } }, 4000);
    </script>
</body>
</html>
